name: Deploy — Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════════
  # Job 1 — Supabase
  # ════════════════════════════════════════════════════════════
  supabase:
    name: Supabase — Migrations & Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link projet Supabase
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Push migrations (production)
        run: |
          set -euo pipefail

          echo "→ Application des migrations..."

          OUTPUT=$(echo "Y" | supabase db push \
            --include-all \
            --password "$SUPABASE_DB_PASSWORD" 2>&1) || {

            echo "$OUTPUT"

            if echo "$OUTPUT" | grep -qE "already exists|duplicate"; then
              echo "⚠️ Objets déjà existants — OK"
              exit 0
            fi

            echo "::error::Échec migrations"
            exit 1
          }

          echo "$OUTPUT"

          echo "→ Vérification drift"
          supabase db diff || echo "⚠️ Drift détecté (non bloquant)"

          echo "✅ Migrations OK"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: |
          set -euo pipefail

          deploy_fn() {
            local fn="$1"; shift
            echo "→ Deploy $fn"

            if ! supabase functions deploy "$fn" \
              --project-ref "$SUPABASE_PROJECT_REF" "$@"; then
              echo "::error::Échec fonction $fn"
              exit 1
            fi
          }

          deploy_fn "send-email"          --no-verify-jwt
          deploy_fn "invite-member"
          deploy_fn "ai-assistant"
          deploy_fn "check-ai-quota"      --no-verify-jwt
          deploy_fn "ensure-org-access"
          deploy_fn "impersonate-user"
          deploy_fn "notify-late-actions"
          deploy_fn "stripe-checkout"
          deploy_fn "stripe-portal"
          deploy_fn "stripe-webhook"      --no-verify-jwt

          echo "✅ Edge Functions OK"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

  # ════════════════════════════════════════════════════════════
  # Job 2 — Vercel
  # ════════════════════════════════════════════════════════════
  vercel:
    name: Vercel — Build & Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: supabase

    outputs:
      prod_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI + jq
        run: |
          npm install -g vercel@latest
          sudo apt-get update && sudo apt-get install -y jq

      - name: Pull env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          set -euo pipefail

          echo "→ Deploy Vercel..."

          JSON=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --json)

          echo "$JSON"

          URL=$(echo "$JSON" | jq -r '.url')

          if [[ -z "$URL" || "$URL" == "null" ]]; then
            echo "::error::URL Vercel introuvable"
            exit 1
          fi

          if [[ "$URL" != http* ]]; then
            URL="https://$URL"
          fi

          echo "url=$URL" >> "$GITHUB_OUTPUT"

          echo "✅ Deploy OK : $URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Résumé deploy
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "Deploy Production — ${{ job.status }}"
          echo "URL    : ${{ steps.deploy.outputs.url }}"
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "════════════════════════════════════════"

  # ════════════════════════════════════════════════════════════
  # Job 3 — Smoke Test
  # ════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 6
    needs: vercel

    steps:
      - name: Smoke Test (Vercel)
        run: |
          set -uo pipefail

          URL="${{ needs.vercel.outputs.prod_url }}"

          echo "→ URL récupérée: '$URL'"

          if [ -z "$URL" ]; then
            echo "::error::prod_url est vide"
            exit 1
          fi

          TARGET="$URL"
          MAX_ATTEMPTS=24
          SLEEP=10

          for ((i=1;i<=MAX_ATTEMPTS;i++)); do

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --location \
              --max-time 25 \
              --retry 3 \
              --retry-delay 2 \
              "$TARGET" || echo "000")

            echo "Tentative $i/$MAX_ATTEMPTS → HTTP $HTTP_CODE"

            if [[ "$HTTP_CODE" =~ ^(200|301|302|307|308)$ ]]; then
              echo "✅ Application disponible"
              exit 0
            fi

            sleep $SLEEP
          done

          echo "::error::Smoke test échoué"
          exit 1

  # ════════════════════════════════════════════════════════════
  # Job 4 — Notification
  # ════════════════════════════════════════════════════════════
  notify-failure:
    name: Notification — Échec production
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [supabase, vercel, smoke-test]
    if: >
      always() && (
        needs.supabase.result == 'failure' ||
        needs.vercel.result == 'failure' ||
        needs.smoke-test.result == 'failure'
      )

    steps:
      - name: Log échec
        run: |
          echo "::error::═══════════════════════════════════════"
          echo "::error::DEPLOY PRODUCTION ÉCHOUÉ"
          echo "Supabase : ${{ needs.supabase.result }}"
          echo "Vercel   : ${{ needs.vercel.result }}"
          echo "Smoke    : ${{ needs.smoke-test.result }}"
          echo "::error::═══════════════════════════════════════"
