name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Raison du déploiement'
        required: false
        default: 'Deploy manuel'

jobs:
  # ════════════════════════════════════════════════════════════
  # Job 1 — Supabase
  # ════════════════════════════════════════════════════════════
  supabase:
    name: Supabase — Migrations & Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link projet Supabase
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Vérification nommage migrations
        run: bash scripts/check-migration-names.sh supabase/migrations

      - name: Check et apply migrations
        run: |
          set -euo pipefail
          echo "→ État des migrations..."
          supabase migration list

          echo "→ Application des migrations en attente..."
          supabase db push --password "$SUPABASE_DB_PASSWORD" \
            && echo "✅ Migrations OK" \
            || {
              echo "::error::Echec db push. Vérifier supabase migration list."
              exit 1
            }
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: |
          set -euo pipefail

          deploy_fn() {
            local fn="$1"; shift
            local max_attempts=3
            local attempt=1

            while [ $attempt -le $max_attempts ]; do
              echo "→ Deploy $fn (tentative $attempt/$max_attempts)"

              OUTPUT=$(supabase functions deploy "$fn" \
                --project-ref "$SUPABASE_PROJECT_REF" \
                "$@" 2>&1)
              EXIT_CODE=$?

              echo "$OUTPUT"

              if [ $EXIT_CODE -eq 0 ]; then
                echo "✅ $fn OK"
                return 0
              fi

              if echo "$OUTPUT" | grep -q "No change found"; then
                echo "✅ $fn inchangée — skip"
                return 0
              fi

              if echo "$OUTPUT" | grep -qE "522|failed to create the graph|timeout"; then
                echo "⚠️ Erreur réseau sur $fn, retry dans 15s..."
                sleep 15
              else
                echo "::error::Erreur non-réseau sur $fn :"
                echo "$OUTPUT"
                return 1
              fi

              attempt=$((attempt + 1))
            done

            echo "::error::$fn échouée après $max_attempts tentatives"
            return 1
          }

          deploy_fn "send-email"          --no-verify-jwt
          deploy_fn "invite-member"
          deploy_fn "ai-assistant"
          deploy_fn "check-ai-quota"      --no-verify-jwt
          deploy_fn "ensure-org-access"
          deploy_fn "impersonate-user"
          deploy_fn "notify-late-actions"
          deploy_fn "stripe-checkout"
          deploy_fn "stripe-portal"
          deploy_fn "stripe-webhook"      --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

  # ════════════════════════════════════════════════════════════
  # Job 2 — Vercel
  # ════════════════════════════════════════════════════════════
  vercel:
    name: Vercel — Build & Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: supabase

    outputs:
      prod_url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Vercel CLI + jq
        run: |
          npm install -g vercel@latest
          sudo apt-get update && sudo apt-get install -y jq

      - name: Pull env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          set -euo pipefail
          echo "→ Deploy Vercel..."
          JSON=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --json)
          echo "$JSON"
          URL=$(echo "$JSON" | jq -r '.url')
          if [[ -z "$URL" || "$URL" == "null" ]]; then
            echo "::error::URL Vercel introuvable"
            exit 1
          fi
          if [[ "$URL" != http* ]]; then
            URL="https://$URL"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deploy OK : $URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # ════════════════════════════════════════════════════════════
  # Job 3 — Smoke Test
  # ════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 6
    needs: vercel
    continue-on-error: true

    steps:
      - name: Smoke Test
        run: |
          set -uo pipefail
          URL="${{ needs.vercel.outputs.prod_url }}"
          echo "→ URL: $URL"
          MAX_ATTEMPTS=24
          SLEEP=10
          for ((i=1;i<=MAX_ATTEMPTS;i++)); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --location --max-time 25 "$URL" || echo "000")
            echo "Tentative $i → HTTP $HTTP_CODE"
            if [[ "$HTTP_CODE" =~ ^(200|301|302|307|308|401)$ ]]; then
              echo "✅ OK"
              exit 0
            fi
            sleep $SLEEP
          done
          echo "::error::Smoke test échoué"
          exit 1

  # ════════════════════════════════════════════════════════════
  # Résumé
  # ════════════════════════════════════════════════════════════
  summary:
    name: Résumé
    runs-on: ubuntu-latest
    needs: [supabase, vercel]
    if: always()

    steps:
      - name: Résumé
        run: |
          echo "✅ Deploy production terminé"
          echo "Raison : ${{ inputs.reason || 'push main' }}"
          echo "URL : ${{ needs.vercel.outputs.prod_url }}"
