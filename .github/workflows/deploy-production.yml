name: Deploy Production (Vercel + Supabase)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Confirmer le déploiement en production (yes)"
        required: true
        default: "no"

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}

    steps:
      # ── Checkout ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node Setup (stable) ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Debug Node environment
        run: |
          node -v
          npm -v

      # ── Install / Quality checks ─────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # ── Supabase Migrations ──────────────────────────────────
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ✅ FIX ICI (gestion duplication migration)
      - name: Push migrations
        run: |
          set +e

          output=$(supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }} --debug 2>&1)
          exit_code=$?

          echo "$output"

          # Si migration déjà appliquée (erreur 23505 schema_migrations), on continue
          echo "$output" | grep -q "23505.*schema_migrations" && {
            echo "Migration déjà appliquée → continuation du déploiement"
            exit 0
          }

          exit $exit_code
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── Supabase Edge Functions ──────────────────────────────
      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e

          supabase functions deploy send-email \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt

          supabase functions deploy invite-member \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

          supabase functions deploy ai-assistant \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

          supabase functions deploy check-ai-quota \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt

          supabase functions deploy ensure-org-access \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

          supabase functions deploy impersonate-user \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

          supabase functions deploy stripe-checkout \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

          supabase functions deploy stripe-portal \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

          supabase functions deploy stripe-webhook \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt

          echo "Edge Functions deployed"

      # ── Vercel Production (robuste) ──────────────────────────
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --debug
