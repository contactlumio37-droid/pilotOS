name: Deploy — Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════════
  # Job 1 — Supabase
  # ════════════════════════════════════════════════════════════
  supabase:
    name: Supabase — Migrations & Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link projet Supabase (production)
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      # ── Migrations ────────────────────────────────────────────
      - name: Push migrations (production)
        id: db_push
        run: |
          set -euo pipefail

          echo "→ Application des migrations..."

          if ! echo "Y" | supabase db push --password "$SUPABASE_DB_PASSWORD"; then
            echo "::error::Échec migrations"
            exit 1
          fi

          echo "→ Vérification drift"
          supabase db diff || echo "⚠️ Drift détecté (non bloquant)"

          echo "✅ Migrations OK"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # ── Edge Functions ────────────────────────────────────────
      - name: Deploy Edge Functions
        run: |
          set -euo pipefail

          deploy_fn() {
            local fn="$1"; shift
            echo "→ Deploy $fn"

            if ! supabase functions deploy "$fn" \
              --project-ref "$SUPABASE_PROJECT_REF" "$@"; then
              echo "::error::Échec fonction $fn"
              exit 1
            fi
          }

          deploy_fn "send-email"          --no-verify-jwt
          deploy_fn "invite-member"
          deploy_fn "ai-assistant"
          deploy_fn "check-ai-quota"      --no-verify-jwt
          deploy_fn "ensure-org-access"
          deploy_fn "impersonate-user"
          deploy_fn "notify-late-actions"
          deploy_fn "stripe-checkout"
          deploy_fn "stripe-portal"
          deploy_fn "stripe-webhook"      --no-verify-jwt

          echo "✅ Edge Functions OK"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

  # ════════════════════════════════════════════════════════════
  # Job 2 — Vercel
  # ════════════════════════════════════════════════════════════
  vercel:
    name: Vercel — Build & Deploy Production
    runs-on: ubuntu-latest
    needs: supabase
    outputs:
      prod_url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Vercel CLI + jq
        run: |
          npm install -g vercel@latest
          sudo apt-get update && sudo apt-get install -y jq

      - name: Pull env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          set -euo pipefail

          echo "→ Deploy Vercel..."

          JSON=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --json)

          echo "$JSON"

          URL=$(echo "$JSON" | jq -r '.url')

          if [[ -z "$URL" || "$URL" == "null" ]]; then
            echo "::error::URL Vercel introuvable"
            exit 1
          fi

          FULL_URL="https://$URL"

          echo "url=$FULL_URL" >> "$GITHUB_OUTPUT"

          echo "✅ Deploy OK : $FULL_URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # ════════════════════════════════════════════════════════════
  # Job 3 — Smoke Test
  # ════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: vercel

    steps:
      - name: Test production
        run: |
          set -euo pipefail

          URL="${{ needs.vercel.outputs.prod_url }}"

          echo "→ Test URL : $URL"

          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              --location "$URL" || echo "000")

            echo "Tentative $i → HTTP $HTTP_CODE"

            if [[ "$HTTP_CODE" =~ ^(200|301|302|308)$ ]]; then
              echo "✅ OK"
              exit 0
            fi

            sleep 15
          done

          echo "::error::Smoke test échoué"
          exit 1

  # ════════════════════════════════════════════════════════════
  # Job 4 — Notification
  # ════════════════════════════════════════════════════════════
  notify-failure:
    runs-on: ubuntu-latest
    needs: [supabase, vercel, smoke-test]
    if: >
      always() && (
        needs.supabase.result == 'failure' ||
        needs.vercel.result == 'failure' ||
        needs.smoke-test.result == 'failure'
      )

    steps:
      - run: |
          echo "::error::DEPLOY ÉCHOUÉ"
          echo "Supabase : ${{ needs.supabase.result }}"
          echo "Vercel   : ${{ needs.vercel.result }}"
          echo "Smoke    : ${{ needs.smoke-test.result }}"
