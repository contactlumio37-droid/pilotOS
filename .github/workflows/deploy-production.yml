name: Deploy Production (Vercel + Supabase)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Confirmer le déploiement en production (yes)'
        required: true
        default: 'no'

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # ── Supabase Migrations ──────────────────────────────────
      - name: Install PostgreSQL client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Push migrations
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGHOST: db.${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co
          PGPORT: 5432
          PGUSER: postgres
          PGDATABASE: postgres
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "→ Applying $f"
            psql -f "$f" || echo "⚠ $f already applied or failed (continuing)"
          done
          echo "✅ Migrations done"

      # ── Supabase Edge Functions ──────────────────────────────
      - name: Install Supabase CLI
        run: |
          curl -sL https://github.com/supabase/cli/releases/download/v2.90.0/supabase_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin supabase
          supabase --version

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy send-email \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
          supabase functions deploy invite-member \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          echo "✅ Edge Functions deployed"

      # ── Vercel Production ────────────────────────────────────
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (Production)
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
